name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # License firewall: fail the build if any production dependency is
      # AGPL/GPL (keeps MuPDF and other copyleft PDF engines out of a
      # permissively-licensed public web app).
      - run: npm run licenses
      - run: npm run build
